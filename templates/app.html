<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vision ChatGPT</title>

    <style>
      * {
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        height: 100vh;
        background: #343541;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
      }

      .chat {
        width: 95%;
        max-width: 900px;
        height: 95vh;
        background: #202123;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .header {
        background: #111827;
        padding: 20px;
        text-align: center;
        font-size: 24px;
        font-weight: bold;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }

      .message {
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 10px;
        max-width: 80%;
        white-space: pre-wrap;
      }

      .user {
        background: #2563eb;
        margin-left: auto;
      }

      .ai {
        background: #444654;
        margin-right: auto;
      }

      .image-gallery {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .image-gallery img {
        width: 120px;
        height: 120px;
        object-fit: cover;
        border-radius: 8px;
      }

      #preview {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 10px 20px;
        max-height: 140px;
        overflow-y: auto;
        background: #1a1b1e;
      }

      .preview-item {
        position: relative;
        display: inline-block;
      }

      .preview-item img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid #444;
      }

      .remove-btn {
        position: absolute;
        top: -6px;
        right: -6px;
        background: #ef4444;
        color: white;
        border: none;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        font-size: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }

      .input-area {
        background: #111827;
        padding: 15px;
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }

      textarea {
        flex: 1;
        min-height: 50px;
        max-height: 150px;
        resize: none;
        border-radius: 8px;
        border: none;
        padding: 12px;
        font-size: 16px;
        line-height: 1.4;
        overflow-y: auto;
        outline: none;
      }

      button, .file-label, .mic-btn {
        background: #10a37f;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 14px 18px;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      button:hover, .file-label:hover, .mic-btn:hover {
        background: #0d8f6f;
      }

      .mic-btn.recording {
        background: #ef4444 !important;
        animation: pulse 1.2s infinite;
      }

      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
      }

      input[type="file"] {
        display: none;
      }

      .file-label {
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <div class="chat">
      <div class="header">Vision ChatGPT</div>

      <div id="messages"></div>
      <div id="preview"></div>

      <div class="input-area">
        <label for="file" class="file-label" title="Attach Images (Max 10)">📎</label>
        <input id="file" type="file" accept="image/*" multiple />

        <textarea
          id="text"
          placeholder="Ask anything or paste/upload images..."
          rows="1"
        ></textarea>

        <button type="button" id="mic-btn" class="mic-btn" onclick="toggleVoiceInput()" title="Voice Input">🎤</button>
        <button id="send-btn" onclick="send()">Send</button>
      </div>
    </div>

    <script>
      let selectedFiles = [];
      let isThinking = false;
      let recognition = null;
      let isRecording = false;
      let finalTranscript = ""; // Persistent transcript storage to prevent resets on pauses

      const maxImages = 10;
      const messages = document.getElementById("messages");
      const fileInput = document.getElementById("file");
      const preview = document.getElementById("preview");
      const textarea = document.getElementById("text");
      const sendBtn = document.getElementById("send-btn");
      const micBtn = document.getElementById("mic-btn");

      function adjustTextareaSize() {
        textarea.style.height = "auto";
        textarea.style.height = Math.min(textarea.scrollHeight, 150) + "px";
        textarea.scrollTop = textarea.scrollHeight;
      }

      textarea.addEventListener("input", function() {
        // If the user manually edits the text field, sync our voice state
        finalTranscript = textarea.value;
        adjustTextareaSize();
      });

      fileInput.onchange = function () {
        if (isThinking) return;
        addFiles(Array.from(this.files));
        this.value = "";
      };

      document.addEventListener("paste", function (event) {
        if (isThinking) return;
        let items = event.clipboardData.items;
        let pastedFiles = [];

        for (let item of items) {
          if (item.type.startsWith("image")) {
            pastedFiles.push(item.getAsFile());
          }
        }

        if (pastedFiles.length > 0) {
          addFiles(pastedFiles);
        }
      });

      function addFiles(files) {
        for (let file of files) {
          if (selectedFiles.length >= maxImages) {
            alert(`Maximum of ${maxImages} images allowed.`);
            break;
          }
          selectedFiles.push(file);
        }
        renderPreviews();
      }

      function removeFile(index) {
        if (isThinking) return;
        selectedFiles.splice(index, 1);
        renderPreviews();
      }

      function renderPreviews() {
        preview.innerHTML = "";
        selectedFiles.forEach((file, index) => {
          let container = document.createElement("div");
          container.className = "preview-item";

          let img = document.createElement("img");
          img.src = URL.createObjectURL(file);

          let removeBtn = document.createElement("button");
          removeBtn.className = "remove-btn";
          removeBtn.textContent = "✕";
          removeBtn.onclick = () => removeFile(index);

          container.appendChild(img);
          container.appendChild(removeBtn);
          preview.appendChild(container);
        });
      }

      // -------------------------------------------------------------
      // SPEECH RECOGNITION WITH ACCUMULATIVE SPEECH & CONTINUOUS PAUSES
      // -------------------------------------------------------------
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;

        function formatGrammarAndPunctuation(text) {
          if (!text) return "";

          let formatted = text.trim();

          // Spoken command substitutions
          formatted = formatted
            .replace(/\b(comma)\b/gi, ",")
            .replace(/\b(period|full stop)\b/gi, ".")
            .replace(/\b(question mark)\b/gi, "?")
            .replace(/\b(exclamation mark|exclamation point)\b/gi, "!");

          // Auto-insert commas before transitional words
          formatted = formatted.replace(/([^,\.\?!])\s+(however|but|although|meanwhile|therefore)\b/gi, "$1, $2");

          // Clean up multiple spaces and spaces before punctuation
          formatted = formatted.replace(/\s+/g, " ");
          formatted = formatted.replace(/\s+([,\.\?!])/g, "$1");

          // Capitalize first letter of sentences
          formatted = formatted.replace(/(^\s*|[\.\?!]\s+)([a-z])/g, (match, separator, char) => {
            return separator + char.toUpperCase();
          });

          return formatted;
        }

        recognition.onresult = function (event) {
          let interimTranscript = "";

          for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
              // Append finalized words to our persistent transcript buffer
              finalTranscript += " " + event.results[i][0].transcript;
            } else {
              // Temporary words actively being spoken
              interimTranscript += event.results[i][0].transcript;
            }
          }

          // Combine saved speech history + active live speech
          let combinedText = finalTranscript + " " + interimTranscript;
          let formattedText = formatGrammarAndPunctuation(combinedText);

          textarea.value = formattedText;
          adjustTextareaSize();
        };

        recognition.onerror = function (event) {
          console.error("Speech Recognition Error:", event.error);
          if (event.error !== "no-speech") {
            stopRecording();
          }
        };

        // Auto-restart recognition if browser stops it due to long silence while mic is active
        recognition.onend = function () {
          if (isRecording) {
            recognition.start();
          }
        };
      } else {
        micBtn.style.display = "none";
      }

      function toggleVoiceInput() {
        if (isThinking) return;
        if (!recognition) {
          alert("Speech Recognition is not supported in this browser.");
          return;
        }

        if (isRecording) {
          stopRecording();
        } else {
          startRecording();
        }
      }

      function startRecording() {
        isRecording = true;
        // Seed our persistent transcript with existing box content
        finalTranscript = textarea.value; 
        micBtn.classList.add("recording");
        micBtn.textContent = "🛑";
        recognition.start();
      }

      function stopRecording() {
        isRecording = false;
        micBtn.classList.remove("recording");
        micBtn.textContent = "🎤";
        if (recognition) recognition.stop();

        // Finalize grammar pass on complete text block
        if (textarea.value.trim()) {
          let formatted = formatGrammarAndPunctuation(textarea.value);
          if (!/[,\.\?!]$/.test(formatted)) {
            formatted += ".";
          }
          textarea.value = formatted;
          finalTranscript = formatted;
        }
        adjustTextareaSize();
      }

      // -------------------------------------------------------------
      // CHAT SUBMISSION LOGIC
      // -------------------------------------------------------------
      function addMessage(text, className, files = []) {
        let div = document.createElement("div");
        div.className = "message " + className;
        div.textContent = text;

        if (files.length > 0) {
          let gallery = document.createElement("div");
          gallery.className = "image-gallery";

          files.forEach((file) => {
            let img = document.createElement("img");
            img.src = URL.createObjectURL(file);
            gallery.appendChild(img);
          });

          div.appendChild(gallery);
        }

        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
      }

      function setInputState(disabled) {
        isThinking = disabled;
        textarea.disabled = disabled;
        fileInput.disabled = disabled;
        sendBtn.disabled = disabled;
        micBtn.disabled = disabled;

        sendBtn.style.opacity = disabled ? "0.5" : "1";
        sendBtn.style.cursor = disabled ? "not-allowed" : "pointer";

        if (disabled && isRecording) {
          stopRecording();
        }
      }

      async function send() {
        if (isThinking) return;

        let text = textarea.value.trim();
        if (!text && selectedFiles.length === 0) return;

        setInputState(true);

        addMessage(text, "user", [...selectedFiles]);

        let form = new FormData();
        form.append("message", text);
        selectedFiles.forEach((file) => form.append("images", file));

        textarea.value = "";
        finalTranscript = ""; // Reset persistent transcript buffer after sending
        textarea.style.height = "50px";
        selectedFiles = [];
        preview.innerHTML = "";

        let thinkingDiv = addMessage("Thinking...", "ai");

        try {
          let response = await fetch("/chat", {
            method: "POST",
            body: form,
          });

          let data = await response.json();

          if (response.ok) {
            thinkingDiv.textContent = data.reply;
          } else {
            thinkingDiv.textContent = "Error: " + (data.error || "Failed to generate response.");
          }
        } catch (err) {
          thinkingDiv.textContent = "Error sending message. Please try again.";
        } finally {
          setInputState(false);
          textarea.focus();
        }
      }

      textarea.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          send();
        }
      });
    </script>
  </body>
</html>
